<!DOCTYPE html>
<html>
<head>
<title>Tabla con colspan y rowspan</title>
</head>
<body>
<table border="1">
<tr>
<th colspan="3">Horario de Clases</th>
</tr>
<tr>
<th>Día</th>
<th>Materia</th>
<th>Horario</th>
</tr>
<tr>
<td rowspan="2">Lunes</td>
<td>Programación</td>
<td>8:00 - 10:00</td>
</tr>
<tr>
<td>Base de Datos</td>
<td>10:00 - 12:00</td>

</tr>
<tr>
<td>Martes</td>
<td colspan="3">dia libre</td>

</tr>
<tr>
<td>Miercoles</td>
<td rowspan="1">Codificacion de HTML</td>
<td colspan="2">Proyecto Integrador</td>
</tr>
<tr>
<td>Jueves</td>
<td rowspan="1">Proyecto Integrador</td>
<td colspan="2">Proyecto Integrador</td>
</tr>
<tr>
<td>Viernes</td>
<td rowspan="1">Proyecto Integrador</td>
<td colspan="3">Proyecto Integrador</td>
</tr>
</table>
</body>
</html>
